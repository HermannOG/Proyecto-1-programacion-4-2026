<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>BolsaEmpleo – Oferentes Pendientes</title>
    <th:block th:replace="~{fragments/layout :: globalStyles}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main>
    <h1 class="page-title">Oferentes pendientes</h1>

    <div class="card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
            <tr>
                <th>Identificación</th>
                <th>Nombre completo</th>
                <th>Correo</th>
                <th>Residencia</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${oferentes}">
                <td th:text="${o.identificacion}">123456</td>
                <td th:text="${o.nombre + ' ' + o.primerApellido}">Nombre</td>
                <td th:text="${o.correo}">correo@email.com</td>
                <td th:text="${o.residencia}">—</td>
                <td>
                    <form th:action="@{/admin/oferentes/{id}/aprobar(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-success btn-sm">Aprobar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${oferentes == null or oferentes.isEmpty()}">
                <td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">
                    No hay oferentes pendientes de aprobación.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
