<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>BolsaEmpleo – Reportes</title>
    <th:block th:replace="~{fragments/layout :: globalStyles}"/>
    <style>
        .report-box { max-width: 420px; }
        .month-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main>
    <h1 class="page-title">Reportes</h1>
    <p class="page-subtitle">Genera reportes en PDF de puestos registrados por mes.</p>

    <div class="card report-box">
        <form th:action="@{/admin/reportes/pdf}" method="get">
            <div class="month-grid">
                <div class="form-group">
                    <label>Año</label>
                    <input type="number" class="form-control" name="anio"
                           th:value="${#dates.year(#dates.createNow())}"
                           min="2020" max="2099" required/>
                </div>
                <div class="form-group">
                    <label>Mes</label>
                    <select class="form-control" name="mes">
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Generar PDF</button>
        </form>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
