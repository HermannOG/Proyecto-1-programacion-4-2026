<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BolsaEmpleo – Inicio</title>
    <th:block th:replace="~{fragments/layout :: globalStyles}"/>
    <style>
        /* ===== HERO ===== */
        .hero {
            margin-bottom: 28px;
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .hero p { color: var(--muted); font-size: 14px; }

        /* ===== PUESTOS GRID ===== */
        .puestos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* ===== PUESTO CARD con hover tooltip ===== */
        .puesto-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            position: relative;
            cursor: default;
        }
        .puesto-card .empresa-nombre {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 4px;
        }
        .puesto-card .puesto-titulo {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .puesto-card .puesto-salario {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
            font-family: 'DM Mono', monospace;
        }
        .puesto-card .btn-detalle {
            display: block;
            width: 100%;
            text-align: center;
            padding: 7px 0;
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: background .15s;
        }
        .puesto-card .btn-detalle:hover { background: var(--accent-h); }

        /* TOOLTIP con las características (CSS puro, sin JS) */
        .puesto-tooltip {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 260px;
            background: var(--navbar);
            color: #e8eaf2;
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 13px;
            box-shadow: var(--shadow-md);
            z-index: 50;
            pointer-events: none;
        }
        .puesto-tooltip h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .puesto-tooltip ul { padding-left: 16px; }
        .puesto-tooltip ul li { margin-bottom: 4px; font-size: 12px; }

        /* Mostrar tooltip al hacer hover sobre la card */
        .puesto-card:hover .puesto-tooltip { display: block; }

        /* ===== EMPTY STATE ===== */
        .empty { color: var(--muted); font-size: 14px; padding: 24px 0; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
    <div class="hero">
        <h1>Bolsa de Empleo</h1>
        <p>Últimos 5 puestos públicos</p>
    </div>

    <div class="puestos-grid" th:if="${puestos != null and !puestos.isEmpty()}">
        <div class="puesto-card" th:each="p : ${puestos}">
            <div class="empresa-nombre" th:text="${p.empresa.nombre}">Empresa</div>
            <div class="puesto-titulo"  th:text="${p.descripcion}">Título del puesto</div>
            <div class="puesto-salario">
                &#8364; <span th:text="${#numbers.formatDecimal(p.salario, 1, 'COMMA', 2, 'POINT')}">0,00</span>
            </div>
            <a th:href="@{/puestos/{id}(id=${p.id})}" class="btn-detalle">Ver detalle</a>

            <!-- TOOLTIP CSS (sin JavaScript) -->
            <div class="puesto-tooltip">
                <h4 th:text="${p.descripcion}">Puesto</h4>
                <ul th:if="${p.caracteristicas != null and !p.caracteristicas.isEmpty()}">
                    <li th:each="c : ${p.caracteristicas}">
                        <span th:text="${c.caracteristica.nombre}">Característica</span>
                        (nivel <span th:text="${c.nivelRequerido}">1</span>)
                    </li>
                </ul>
                <span th:if="${p.caracteristicas == null or p.caracteristicas.isEmpty()}"
                      style="font-size:12px;color:#9ca3af;">Sin requisitos especificados</span>
            </div>
        </div>
    </div>

    <p class="empty" th:if="${puestos == null or puestos.isEmpty()}">
        No hay puestos públicos disponibles en este momento.
    </p>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
