<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>BolsaEmpleo – Publicar Puesto</title>
    <th:block th:replace="~{fragments/layout :: globalStyles}"/>
    <style>
        .req-row {
            display: grid;
            grid-template-columns: 1fr 120px 36px;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .req-row select, .req-row input { margin: 0; }
        #reqs-container { margin-bottom: 12px; }
        .add-row-btn {
            background: none;
            border: 1px dashed var(--border);
            color: var(--accent);
            font-size: 13px;
            padding: 6px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: inherit;
        }
        .add-row-btn:hover { background: var(--bg); }
        .req-toggle { display: none; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main>
    <h1 class="page-title">Publicar nuevo puesto</h1>

    <div class="card" style="max-width:680px;">
        <form th:action="@{/empresa/puestos/nuevo}" method="post">

            <div class="form-group">
                <label>Descripción del puesto</label>
                <textarea class="form-control" name="descripcion" rows="3" required
                          placeholder="Ej. Frontend Developer, Full Stack Developer…"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="form-group">
                    <label>Salario ofrecido (€)</label>
                    <input type="number" class="form-control" name="salario"
                           min="0" step="0.01" required placeholder="1500.00"/>
                </div>
                <div class="form-group">
                    <label>Tipo de publicación</label>
                    <select class="form-control" name="esPublico">
                        <option value="true">Público</option>
                        <option value="false">Privado</option>
                    </select>
                </div>
            </div>

            <!-- Características requeridas -->
            <div class="form-group">
                <label style="margin-bottom:10px;">Características requeridas</label>

                <div id="reqs-container">
                    <th:block th:each="i : ${#numbers.sequence(0,9)}">
                        <div class="req-row" th:id="'req-row-'+${i}"
                             th:style="${i > 0} ? 'display:none' : ''">
                            <select class="form-control" name="caracIds">
                                <option value="">– Característica –</option>
                                <option th:each="c : ${caracteristicas}"
                                        th:if="${c.hijos == null or c.hijos.isEmpty()}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}">Característica</option>
                            </select>
                            <input type="number" class="form-control"
                                   name="niveles"
                                   min="1" max="5" value="1" placeholder="Nivel 1-5"/>
                        </div>
                    </th:block>
                </div>

                <input type="checkbox" id="show1" class="req-toggle"
                       onchange="document.getElementById('req-row-1').style.display=this.checked?'grid':'none'; document.getElementById('lbl1').style.display='none'; document.getElementById('lbl2').style.display='inline-block';"/>
                <label for="show1" class="add-row-btn" id="lbl1">+ Agregar característica</label>

                <input type="checkbox" id="show2" class="req-toggle"
                       onchange="document.getElementById('req-row-2').style.display=this.checked?'grid':'none'; document.getElementById('lbl2').style.display='none'; document.getElementById('lbl3').style.display='inline-block';"/>
                <label for="show2" class="add-row-btn" id="lbl2" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show3" class="req-toggle"
                       onchange="document.getElementById('req-row-3').style.display=this.checked?'grid':'none'; document.getElementById('lbl3').style.display='none'; document.getElementById('lbl4').style.display='inline-block';"/>
                <label for="show3" class="add-row-btn" id="lbl3" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show4" class="req-toggle"
                       onchange="document.getElementById('req-row-4').style.display=this.checked?'grid':'none'; document.getElementById('lbl4').style.display='none'; document.getElementById('lbl5').style.display='inline-block';"/>
                <label for="show4" class="add-row-btn" id="lbl4" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show5" class="req-toggle"
                       onchange="document.getElementById('req-row-5').style.display=this.checked?'grid':'none'; document.getElementById('lbl5').style.display='none'; document.getElementById('lbl6').style.display='inline-block';"/>
                <label for="show5" class="add-row-btn" id="lbl5" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show6" class="req-toggle"
                       onchange="document.getElementById('req-row-6').style.display=this.checked?'grid':'none'; document.getElementById('lbl6').style.display='none'; document.getElementById('lbl7').style.display='inline-block';"/>
                <label for="show6" class="add-row-btn" id="lbl6" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show7" class="req-toggle"
                       onchange="document.getElementById('req-row-7').style.display=this.checked?'grid':'none'; document.getElementById('lbl7').style.display='none'; document.getElementById('lbl8').style.display='inline-block';"/>
                <label for="show7" class="add-row-btn" id="lbl7" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show8" class="req-toggle"
                       onchange="document.getElementById('req-row-8').style.display=this.checked?'grid':'none'; document.getElementById('lbl8').style.display='none'; document.getElementById('lbl9').style.display='inline-block';"/>
                <label for="show8" class="add-row-btn" id="lbl8" style="display:none;">+ Agregar característica</label>

                <input type="checkbox" id="show9" class="req-toggle"
                       onchange="document.getElementById('req-row-9').style.display=this.checked?'grid':'none'; document.getElementById('lbl9').style.display='none';"/>
                <label for="show9" class="add-row-btn" id="lbl9" style="display:none;">+ Agregar característica</label>
            </div>

            <div style="display:flex;gap:10px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">Publicar</button>
                <a th:href="@{/empresa/puestos}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>

    <p style="font-size:12px;color:var(--muted);margin-top:12px;">
        Nota: puede agregar hasta 10 características. Deje vacías las que no necesite.
    </p>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
